        <div id="cube-actions">
            <h1>Cube Actions:</h1>
            <button id="reset-cube">Reset cube</button>
            <button id="scramble-cube">Scramble cube</button>

            <label for="alginput">Input alg:</label>
            <input type="text" id="alginput" name="alginput" pattern="^[RUFDLB'2\s]*$">
            <button id="submit-alg">Run Alg</button>

            <label for="algdropdown">Select alg:</label>
            <select id="algdropdown">
                <option>J-Perm</option>
                <option>T-Perm</option>
                <option>Y-Perm</option>
                <option>F-Perm</option>
                <option>L-Perm</option>
                <option>Ra-Perm</option>
                <option>Rb-Perm</option>
                <option>Aa-Perm</option>
                <option>Ab-Perm</option>
                <option>H-Perm</option>
                <option>Na-Perm</option>
                <option>Nb-Perm</option>
                <option>Ua-Perm</option>
                <option>Ub-Perm</option>
                <option>Z-Perm</option>
                <option>V-Perm</option>
                <option>E-Perm</option>
            </select>
            <button id="submit-dropdown">Run Alg</button>

            <h2>Cube Moves:</h2>
            <button id="undo">Undo last</button>
            <div id="cube-moves">
                <button id="R">R</button>
                <button id="Rp">R'</button>
                <button id="R2">R2</button>

                <button id="F">F</button>
                <button id="Fp">F'</button>
                <button id="F2">F2</button>

                <button id="U">U</button>
                <button id="Up">U'</button>
                <button id="U2">U2</button>

                <button id="L">L</button>
                <button id="Lp">L'</button>
                <button id="L2">L2</button>

                <button id="D">D</button>
                <button id="Dp">D'</button>
                <button id="D2">D2</button>

                <button id="B">B</button>
                <button id="Bp">B'</button>
                <button id="B2">B2</button>
            </div>
        </div>
