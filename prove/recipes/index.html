<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="styles.css" , rel="stylesheet">
    <script src="script.js" , defer></script>

    <meta name="description" content="A collection of recipes">
    <meta name="author" content="Joey Moore">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

</head>

<body>
    <header>
        <img id="logo" src="images/recipe-book.png" alt="A recipe book icon">
        <h1>Recipe Book</h1>
    </header>

    <div id="search-bar">
        <input type="text" placeholder="Search..">
        <img src="images/search.svg" alt="search bar icon">
    </div>

    <hr>

    <main>
        <section class="recipes">
            <section class="recipe">
                <img src="images/apple-crisp.jpg" alt="image of an apple crisp">

                <div>
                    <p class="search-tag">dessert</p>
                    <p class="recipe-title">Apple Crisp</p>


                    <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>

                    <p class="recipe-desc">This apple crisp recipe is a simple yet delicious fall dessert that's great
                        served with vanilla ice cream.</p>
                </div>
            </section>
        </section>
    </main>

    <footer>
        <a id="credit" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by
            Freepik -
            Flaticon</a>

        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>
    </footer>

</body>



</html>
